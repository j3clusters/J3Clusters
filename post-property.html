<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Property | J3 Clusters</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="./index.html">J3 Clusters</a>
        <nav>
          <ul class="nav-list">
            <li><a href="./listings.html">Buy</a></li>
            <li><a href="./listings.html">Rent</a></li>
            <li><a href="./post-property.html">Post Property</a></li>
            <li><a href="./contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container section narrow">
      <h1>Post your property</h1>
      <p>Add your property details and our team will verify before listing.</p>
      <form class="stacked-form">
        <label>
          Owner Name
          <input type="text" required />
        </label>
        <label>
          Property Type
          <select required>
            <option value="">Select type</option>
            <option>Apartment</option>
            <option>Villa</option>
            <option>Plot</option>
          </select>
        </label>
        <label>
          City
          <input type="text" required />
        </label>
        <label>
          Expected Price (INR)
          <input type="number" min="0" step="100000" required />
        </label>
        <label>
          Description
          <textarea rows="4" required></textarea>
        </label>
        <button type="submit">Submit property</button>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>&copy; 2026 J3 Clusters. All rights reserved.</p>
        <a href="./contact.html">Need help?</a>
      </div>
    </footer>
  </body>
</html>
