<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | J3 Clusters</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="./index.html">J3 Clusters</a>
        <nav>
          <ul class="nav-list">
            <li><a href="./listings.html">Buy</a></li>
            <li><a href="./listings.html">Rent</a></li>
            <li><a href="./post-property.html">Post Property</a></li>
            <li><a href="./contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container section narrow">
      <h1>Contact J3 Clusters</h1>
      <p>
        Share your requirement and our team will help you shortlist suitable
        properties.
      </p>
      <form class="stacked-form">
        <label>
          Full Name
          <input type="text" required />
        </label>
        <label>
          Mobile Number
          <input type="tel" required />
        </label>
        <label>
          Email
          <input type="email" required />
        </label>
        <label>
          Requirement
          <textarea rows="4" placeholder="Apartment in Gachibowli, 2 BHK, budget 80L"></textarea>
        </label>
        <button type="submit">Submit inquiry</button>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <p>&copy; 2026 J3 Clusters. All rights reserved.</p>
        <a href="./listings.html">Explore listings</a>
      </div>
    </footer>
  </body>
</html>
