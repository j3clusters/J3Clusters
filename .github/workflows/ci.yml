# Verifies every push/PR: install, ESLint, Next.js production build.
# Does not deploy or touch Vercel/DB/DNS (those require your accounts).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      # Placeholders so `prisma generate` (postinstall) and `next build` succeed without a real DB.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-minimum-32-chars!!
      USER_JWT_SECRET: ci-user-jwt-secret-minimum-32-chars!!
      NEXT_PUBLIC_APP_URL: https://ci.example.invalid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
